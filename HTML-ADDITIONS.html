<!-- أضف زر الحسابات الائتمانية في القائمة الجانبية بين الموردين والمشتريات -->
<button type="button" class="nav-item" data-page="credit">
  <span class="nav-icon">📝</span>
  <span>دفتر الديون</span>
</button>

<!-- ============================================ -->
<!-- صفحة الحسابات الائتمانية -->
<!-- أضف هذا في الجزء الرئيسي بين صفحة الموردين والمشتريات -->
<!-- ============================================ -->

<section class="page" id="page-credit" data-title="الحسابات الائتمانية">
  <div class="credit-grid">
    <div class="card pad">
      <div class="toolbar">
        <button type="button" class="btn btn-primary" id="credit-add">إضافة حساب ائتماني</button>
      </div>
      <div class="table-wrap">
        <table class="table table-dense">
          <thead>
            <tr>
              <th>#</th>
              <th>اسم العميل</th>
              <th>رقم الهاتف</th>
              <th>المبلغ المستحق</th>
              <th>تاريخ الإنشاء</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="credit-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<!-- ============================================ -->
<!-- أزرار الحذف في جداول المشتريات والمبيعات -->
<!-- ============================================ -->

<!-- في جدول المشتريات أضف هذا في الصف الأخير: -->
<td>
  <button type="button" class="link-btn" data-view-pur="${p.id}">عرض</button>
  <button type="button" class="link-btn danger" data-del-pur="${p.id}">حذف</button>
</td>

<!-- في جدول المبيعات أضف هذا في الصف الأخير: -->
<td>
  <button type="button" class="link-btn" data-sale="${s.id}">التفاصيل</button>
  <button type="button" class="link-btn danger" data-del-sale="${s.id}">حذف</button>
</td>
